name: Deploy PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

concurrency: preview-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        if: github.event.action != 'closed'

      - name: Set preview base URL
        if: github.event.action != 'closed'
        run: |
          sed -i "s|^url:.*|url: docs.artblocks.io/pr-preview/pr-${{ github.event.number }}|" retype.yml

      - uses: retypeapp/action-build@v4
        if: github.event.action != 'closed'
        with:
          license: ${{ secrets.RETYPE_SECRET }}

      - uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: .retype
          pages-branch: retype
