input: .
output: .retype
url: docs.artblocks.io

start:
  # Start locally in Pro mode
  pro: true

nav:
  mode: stack
  icons:
    mode: top

theme:
  base:
    base-color: "#9B19EF"
    base-bg: "#F9F9F9"
    base-text: "#1E1E1E"
    base-link-weight: 500
  dark:
    base-color: "#D41FD6"

branding:
  title: Art Blocks
  label: Docs
  logo: static/squigLogo.png
  colors:
    label: "#000000"

integrations:
  googleAnalytics:
    id: G-NGMHL6GNM0

edit:
  repo: https://github.com/ArtBlocks/artblocks-docs

links:
  - text: Art Blocks
    link: https://artblocks.io/
    icon: home

  - text: Docs
    link: /readme.md
    icon: file


footer:
  copyright: "&copy; Copyright {{ year }}. All rights reserved."
  links:
    - text: Privacy Policy
      link: https://www.artblocks.io/privacy-policy.pdf
      target: blank
      title: Art Blocks privacy policy (PDF)
    - text: User Terms
      link: https://www.artblocks.io/user-terms.pdf
      target: blank
      title: Art Blocks user terms (PDF)

poweredByRetype: false
