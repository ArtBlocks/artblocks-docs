input: .
output: .retype
url: docs.artblocks.io

branding:
  title: Art Blocks
  label: Docs
  logo: static/squigLogo.png
  colors:
    label: "#000000"

integrations:
  googleAnalytics:
    id: G-NGMHL6GNM0

edit:
  repo: https://github.com/ArtBlocks/artblocks-docs

links:
  - text: Art Blocks
    link: https://artblocks.io/
    icon: home

  - text: Docs
    link: /readme.md
    icon: file

actions:
  items:
    - text: Copy page
      action: copy-page-markdown
      icon: copy
    - text: Copy link
      action: copy-page-link
      icon: link
    - text: View as Markdown
      action: view-page-markdown
      icon: markdown

footer:
  copyright: "&copy; Copyright {{ year }}. All rights reserved."
  links:
    - text: Privacy Policy
      link: https://www.artblocks.io/privacy-policy.pdf
      target: blank
      title: Art Blocks privacy policy (PDF)
    - text: User Terms
      link: https://www.artblocks.io/user-terms.pdf
      target: blank
      title: Art Blocks user terms (PDF)

poweredByRetype: false
